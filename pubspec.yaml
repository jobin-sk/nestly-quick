name: nestlyquick
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # FAB speed dial menu
  flutter_speed_dial: ^7.0.0

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.2

  # Firebase — core required for all Firebase services
  firebase_core: ^3.0.0

  # Firebase — handles login, signup, session management
  firebase_auth: ^5.0.0

  # Firebase — Firestore cloud database
  cloud_firestore: ^5.0.0

  # Native splash screen
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/nestlyquick.png"
  adaptive_icon_background: "#1E1B4B"
  adaptive_icon_foreground: "assets/nestlyquick.png"

flutter_native_splash:
  color: "#1E1B4B"
  image: assets/nestlyquick.png
  android_12:
    color: "#1E1B4B"
    image: assets/nestlyquick.png